name: Build and Commit Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore FileCounterPro.csproj

    - name: Build and Publish self-contained executable
      run: dotnet publish FileCounterPro.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Commit Exe to Repo
      run: |
        copy ./publish/FileCounterPro_Windows.exe ./FileCounterPro_Windows.exe
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add FileCounterPro_Windows.exe
        git commit -m "🚀 Auto-build: Update FileCounterPro_Windows.exe" || echo "No changes to commit"
        git push
